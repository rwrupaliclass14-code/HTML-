<!DOCTYPE html>
<html>
    <head>
	   <title>Student form</title>
	   
	      <style>
              body {
			  background-image: url('my_background.jpg'); 
              background-repeat: no-repeat;
              background-attachment: fixed;
              background-size: 100% 100%;
                  }
				  
                  
          </style>
	</head>
	
    <body>
	   <center>
	      <font color="green" face="Verdana">
           <h1>REGISTRATION FORM</h1>
		  </font> 
		     <form>
			   <div>
			     <label><b>First Name</label>
				 <input type="tax" placeholder="first name " required>
			         &nbsp; &nbsp; &nbsp; 
				 <label><b>Last Name</label>
				 <input type="tax" placeholder="Last name " required>
			   </div> 	
                  <br/>
				  
               <div>	
			      <label><b>Email<label>
				    <input type="email" placeholder="you@gmail.com" required>
					&nbsp; &nbsp; &nbsp; &nbsp; 
			     <label><b>Password<label>
				    <input type="Password" placeholder="********" required> 
			   </div>	
                   <br/>

               <div>	
			      <label><b>Phone Number<label>
				    <input type="tel" name="Number" placeholder="+91 *** *** ****" required>
				   &nbsp; &nbsp; 
			      <label><b>Team Size<label>
				    <input type="range">
			   </div>	
                   <br/>

               <div>	
			     <label><b>Favorite color<label>
				    <input type="color">  
                </div>	
                   <br/>
				   
               <div>	
			     <label><b>Gender :<label>
				    <input type="radio" name="Gender"> 
                 <label><b>Male<label>
				    <input type="radio" name="Gender"> 
                 <label><b>Female<label>
				    <input type="radio" name="Gender"> 					
				 <label><b>Other<label>	
               </div>	
                   <br/>	

               <div>	
			     <label><b>Date Of Birth<label>
				    <input type="Date">  
					&nbsp; &nbsp; &nbsp; &nbsp; 
					<label>Location</label>			   
			     <select>
                     <option>🌎India<option>
					 <option>🌎Brazil<option>
					 <option>🌎Germany<option>
					 <option>🌎Japan<option>
					
                 </select>			
                </div>	
                   <br/>

               <div>	
                  <label>Skills :</label>
				    <input type="checkbox">
				  <label>HTML</label>
				    <input type="checkbox">
					<label>JAVASCRIPT</label>
				    <input type="checkbox">
					<label>NODE-JS</label>
				    <input type="checkbox">
					<label>ENGULOR</label>
				    
               </div>	
                   <br/>

               <div>	
			     <label><b>Upload Resume<label>
				    <input type="file">  
                </div>	
                   <br/>

                <div>
				   <label>message-box</label><br/>
				   <textarea rows="4" cols="30" placeholder="Write your message here..."></textarea>
                </div>	
				  <hr/>
                    <button style="background-color: blue; color: white;">Send</button>
					<button style="background-color: red; color: white;">Reset</button>
			 </form>
	   </center>	  
        
    </body>
	
</html>
